{{template "base.html" .}}

{{define "content"}}
<div class="fade-in max-w-2xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Create Election Group</h1>
        <a href="/admin" class="text-sm text-primary hover:underline">Back to Dashboard</a>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg border border-gray-200 dark:border-gray-700 p-6">
        <form action="/admin/group/new" method="POST" class="space-y-6">
            {{.csrfField}}
            
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Group Name</label>
                <input type="text" name="name" id="name" required placeholder="e.g. 2026/2027 NADSAS Election" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2 border">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description (Optional)</label>
                <textarea name="description" id="description" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2 border"></textarea>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-900 transition-colors">Create Group</button>
            </div>
        </form>
    </div>
</div>
{{end}}
