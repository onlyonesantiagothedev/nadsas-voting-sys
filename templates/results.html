{{template "base.html" .}}

{{define "content"}}
<div class="fade-in max-w-4xl mx-auto">
    <div class="mb-8 border-b border-gray-200 dark:border-gray-700 pb-5 text-center">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Live Results: {{.Election.Title}}</h1>
    </div>

    <!-- HTMX will poll this div -->
    <div hx-get="/results/{{.Election.ID}}/fragment" hx-trigger="load, every 10s" hx-swap="outerHTML">
        <div class="text-center py-10">
            <svg class="animate-spin h-8 w-8 text-primary mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-4 text-gray-500">Loading live results...</p>
        </div>
    </div>
    
    <div class="mt-8 text-center">
        <a href="/" class="text-primary hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 font-medium">&larr; Back to Home</a>
    </div>
</div>
{{end}}
